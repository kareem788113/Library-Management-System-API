<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Library System</title>
  <!-- الربط بملف الـ CSS الموحد اللي فيه نظام السنترة الجديد -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="register">

  <!-- Navbar الموحد لسهولة التنقل -->
  <nav class="navbar">
    <div class="logo">
      <h2>📚 Library System</h2>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="books.html">Books</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <!-- استخدام كلاس hero لضمان السنترة في نص الصفحة بالظبط -->
  <main class="hero">
    <section class="auth-shell">
      <form class="auth-card" id="register-form" style="width: 100%; max-width: 450px; margin: 0 auto;">
        
        <p class="eyebrow" style="color: #38bdf8; font-weight: bold; margin-bottom: 10px;">New User</p>
        <h1 style="font-size: 36px; margin-bottom: 20px;">Create Account</h1>

        <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
          <label style="display: flex; flex-direction: column; gap: 5px;">
            Username
            <input id="registerUsername" name="username" type="text" required 
                   style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white;">
          </label>

          <label style="display: flex; flex-direction: column; gap: 5px;">
            Password
            <input id="registerPassword" name="password" type="password" required 
                   style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white;">
          </label>

          <button class="btn" type="submit" style="width: 100%; margin-top: 10px;">
            Register
          </button>
        </div>

        <p class="muted center" style="margin-top: 20px; color: #cbd5e1;">
          Already have account?
          <a href="login.html" style="color: #38bdf8; text-decoration: none;">Login</a>
        </p>

      </form>
    </section>
  </main>

  <!-- ملفات الـ JS -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
