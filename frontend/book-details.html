<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Details | Library System</title>
  <!-- الربط بملف الـ CSS الموحد -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="book-details">

  <!-- Navbar الموحد لسهولة التنقل -->
  <nav class="navbar">
    <div class="logo">
      <h2>📚 Library System</h2>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="books.html">Books</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <!-- استخدام كلاس hero للسنترة الكاملة -->
  <main class="hero">

    <section class="page-title">
      <p class="eyebrow" style="color: #38bdf8; font-weight: bold; margin-bottom: 10px;">Information</p>
      <h1 id="bookTitle" style="font-size: 48px; margin-bottom: 30px;">Loading...</h1>
    </section>

    <!-- عرض التفاصيل والأزرار في شبكة متزنة ومسنترة -->
    <div class="cards" style="width: 100%; max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; text-align: left;">
      
      <!-- كارت تفاصيل الكتاب -->
      <article class="card" id="book-details">
        <!-- البيانات بتتحقن هنا بالـ JS -->
      </article>

      <!-- كارت الأزرار (Actions) -->
      <article class="card">
        <h2 style="margin-bottom: 20px; color: #38bdf8; font-size: 24px;">Actions</h2>
        <div class="stack" id="bookActions" style="display: flex; flex-direction: column; gap: 15px;">
          <!-- الأزرار زي استعارة أو تعديل بتظهر هنا -->
        </div>
      </article>

    </div>

  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ملفات الـ JS الأساسية -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/books.js"></script>
  <script src="js/borrow.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
